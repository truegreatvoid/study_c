services:
  mysql:
    container_name: docker_mysql
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: viva_segura
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      TZ: America/Recife
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - network

  schemaspy:
    container_name: docker_schemaspy
    image: schemaspy/schemaspy:latest
    profiles:
      - tools
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - network
    volumes:
      - ./schema-docs:/output
    command: >
      -t mysql
      -host mysql
      -port 3306
      -db viva_segura
      -s viva_segura
      -u app
      -p app
      
volumes:
  mysql_data:

networks:
  network:
    name: inter_mysql_network
    driver: bridge